services:
  - type: web
    name: axisfood-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py seed_demo
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: axisfood-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://axisfoodproyecto.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://axisfoodproyecto.vercel.app
      - key: AXISFOOD_DEMO_ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
